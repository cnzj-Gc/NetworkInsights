externalDocs:
  description: Project documentation at CAMARA
  url: https://github.com/camaraproject/NetworkInsights
servers:
  - url: "{apiRoot}/network-health-assessment/vwip"
    variables:
      apiRoot:
        default: http://localhost:9091
        description: API root, defined by the service provider, e.g. `api.example.com` or `api.example.com/somepath`
tags:
  - name: Network Health Assessment
    description: Query Network Health Assessment scores for specific network modules.
paths:
  /health-scores:
    post:
      tags:
        - Network Health Assessment
      summary: Query the latest network health score
      description: |
        Query the health assessment results of the specified network module at the latest time point.
        - Returns the health score (0-100) for the selected network module.
      operationId: getHealthScores
      security:
        - openId:
            - network-health-assessment:health-scores:read
      parameters:
        - $ref: "#/components/parameters/x-correlator"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - networkId
                - netType
              properties:
                networkId:
                  $ref: "#/components/schemas/NetworkId"
                netType:
                  $ref: "#/components/schemas/NetTypeEnum"
            examples:
              EXAMPLE_NET:
                value:
                  networkId: "123e4567-e89b-12d3-a456-426614174000"
                  netType: "NET"
              EXAMPLE_NET_WIRELESS:
                value:
                  networkId: "123e4567-e89b-12d3-a456-426614174000"
                  netType: "NET_WIRELESS"
      responses:
        "200":
          description: Health score queried successfully
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthInfo"
              examples:
                RESPONSE_NET:
                  $ref: "#/components/examples/RESPONSE_EXAMPLE_NET"
                RESPONSE_NET_WIRELESS:
                  $ref: "#/components/examples/RESPONSE_EXAMPLE_NET_WIRELESS"
        "400":
          $ref: "#/components/responses/Generic400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/Generic403"
        "404":
          $ref: "#/components/responses/Generic404"

components:
  securitySchemes:
    openId:
      description: OpenID Connect authentication
      type: openIdConnect
      openIdConnectUrl: https://example.com/.well-known/openid-configuration

  parameters:
    x-correlator:
      name: x-correlator
      in: header
      description: Correlation id for the different services
      schema:
        $ref: "../common/CAMARA_common.yaml#/components/schemas/XCorrelator"

  headers:
    x-correlator:
      description: Correlation id for the different services
      schema:
        $ref: "../common/CAMARA_common.yaml#/components/schemas/XCorrelator"

  schemas:
    NetworkId:
      description: Network ID in UUID format (unique identifier of the analyzed network)
      type: string
      format: uuid
      maxLength: 36
      example: "123e4567-e89b-12d3-a456-426614174000"

    Score:
      title: HealthScore
      description: Value of the health score (0-100, higher is better)
      type: number
      format: double
      minimum: 0
      maximum: 100
      example: 94.56

    HealthInfo:
      title: NetworkHealthInfo
      description: Network health score information
      allOf:
        - type: object
          properties:
            networkId:
              $ref: "#/components/schemas/NetworkId"
            netType:
              $ref: "#/components/schemas/NetTypeEnum"
            score:
              $ref: "#/components/schemas/Score"
            scoringTime:
              type: string
              format: date-time
              maxLength: 64
              description: Latest time point of the health score calculation. It must follow [RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) and must have time zone.
              example: "2025-12-01T12:00:00Z"
          required:
            - networkId
            - netType
            - score
            - scoringTime

    NetTypeEnum:
      title: NetworkModuleType
      description: Enums of network module types
      type: string
      enum:
        - NET
        - NET_WIRELESS
        - NET_TRANSPORT
        - NET_CORE
      example: "NET"

  responses:
    Generic400:
      description: Bad Request
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            $ref: "../common/CAMARA_common.yaml#/components/schemas/ErrorInfo"
          examples:
            GENERIC_400_INVALID_ARGUMENT:
              description: Invalid Argument. Generic Syntax Exception
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: Client specified an invalid argument, request body or query param.
            GENERIC_400_OUT_OF_RANGE:
              description: Out of Range. Specific Syntax Exception used when a given field has a pre-defined range or a invalid filter criteria combination is requested
              value:
                status: 400
                code: OUT_OF_RANGE
                message: Client specified an invalid range.
    Generic401:
      description: Unauthorized
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            $ref: "../common/CAMARA_common.yaml#/components/schemas/ErrorInfo"
          examples:
            GENERIC_401_UNAUTHENTICATED:
              description: Request cannot be authenticated and a new authentication is required
              value:
                status: 401
                code: UNAUTHENTICATED
                message: Request not authenticated due to missing, invalid, or expired credentials. A new authentication is required.
    Generic403:
      description: Forbidden
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            $ref: "../common/CAMARA_common.yaml#/components/schemas/ErrorInfo"
          examples:
            GENERIC_403_PERMISSION_DENIED:
              description: Permission denied. OAuth2 token access does not have the required scope or when the user fails operational security
              value:
                status: 403
                code: PERMISSION_DENIED
                message: Client does not have sufficient permissions to perform this action.
    Generic404:
      description: Not found
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            $ref: "../common/CAMARA_common.yaml#/components/schemas/ErrorInfo"
          examples:
            GENERIC_404_NOT_FOUND:
              description: Resource is not found
              value:
                status: 404
                code: NOT_FOUND
                message: The specified resource is not found.

  examples:
    RESPONSE_EXAMPLE_NET:
      description: Example response for health score of the entire network (NET type)
      value:
        networkId: "123e4567-e89b-12d3-a456-426614174000"
        netType: "NET"
        score: 94.56
        scoringTime: "2025-12-01T12:00:00Z"
    RESPONSE_EXAMPLE_NET_WIRELESS:
      description: Example response for health score of the wireless network module (NET_WIRELESS type)
      value:
        networkId: "123e4567-e89b-12d3-a456-426614174000"
        netType: "NET_WIRELESS"
        score: 90.12
        scoringTime: "2025-12-01T12:00:00Z"
